services:
  - type: web
    name: deskmate-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: BACKEND_PUBLIC_URL
        value: https://deskmate-api.onrender.com
      - key: FRONTEND_PUBLIC_URL
        value: https://deskmate-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://deskmate-web.onrender.com
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: https://.*\.onrender\.com

  - type: web
    name: deskmate-web
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && printf "window.__DESKMATE_API_BASE_URL__ = '%s';\n" "$REACT_APP_API_BASE_URL" > public/runtime-config.js && npm run build
    staticPublishPath: frontend/build
    autoDeployTrigger: checksPass
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://deskmate-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

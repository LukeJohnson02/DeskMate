name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-test-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s "Tests/Unit Tests" -p "*_tests.py"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      REACT_APP_API_BASE_URL: http://localhost:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  selenium:
    name: Selenium e2e
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    env:
      SECRET_KEY: ci-test-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      BACKEND_PUBLIC_URL: http://localhost:8000
      FRONTEND_PUBLIC_URL: http://localhost:3000
      REACT_APP_API_BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            e2e/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Selenium test dependencies
        run: python -m pip install -r e2e/requirements.txt

      - name: Seed backend database
        working-directory: backend
        run: python Tests/populate_db.py

      - name: Start backend
        working-directory: backend
        run: python -m uvicorn main:app --host 127.0.0.1 --port 8000 > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: BROWSER=none HOST=127.0.0.1 npm start > ../frontend.log 2>&1 &

      - name: Wait for app
        run: |
          for url in http://127.0.0.1:8000 http://127.0.0.1:3000; do
            for attempt in {1..60}; do
              if curl --silent --fail "$url" > /dev/null; then
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $url"
                cat backend.log || true
                cat frontend.log || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run Selenium tests
        run: python -m pytest e2e -q

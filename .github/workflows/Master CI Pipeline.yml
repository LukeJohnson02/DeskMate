name: Master Deployment Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: master-deployment-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  BACKEND_ENV_SECRET_KEY: ci-test-secret
  BACKEND_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  BACKEND_PUBLIC_URL: http://localhost:8000
  FRONTEND_PUBLIC_URL: http://localhost:3000
  REACT_APP_API_BASE_URL: http://localhost:8000
  FRONTEND_URL: http://localhost:3000

jobs:
  backend-release-checks:
    name: Backend release checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ${{ env.BACKEND_ENV_SECRET_KEY }}
      CORS_ALLOWED_ORIGINS: ${{ env.BACKEND_CORS_ALLOWED_ORIGINS }}
      BACKEND_PUBLIC_URL: ${{ env.BACKEND_PUBLIC_URL }}
      FRONTEND_PUBLIC_URL: ${{ env.FRONTEND_PUBLIC_URL }}
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Check backend formatting
        run: black --check .

      - name: Run backend lint
        run: pylint --rcfile=../.pylintrc .

      - name: Run backend unit tests
        run: python -m unittest discover -s "Tests/Unit Tests" -p "*_tests.py"

      - name: Validate backend imports
        run: python -c "from main import app; print(app.title)"

  frontend-release-checks:
    name: Frontend release checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true
      REACT_APP_API_BASE_URL: ${{ env.REACT_APP_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test -- --watchAll=false

      - name: Build production frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          if-no-files-found: error

  selenium-e2e:
    name: Selenium end-to-end
    runs-on: ubuntu-latest
    needs:
      - backend-release-checks
      - frontend-release-checks

    env:
      SECRET_KEY: ${{ env.BACKEND_ENV_SECRET_KEY }}
      CORS_ALLOWED_ORIGINS: ${{ env.BACKEND_CORS_ALLOWED_ORIGINS }}
      BACKEND_PUBLIC_URL: ${{ env.BACKEND_PUBLIC_URL }}
      FRONTEND_PUBLIC_URL: ${{ env.FRONTEND_PUBLIC_URL }}
      REACT_APP_API_BASE_URL: ${{ env.REACT_APP_API_BASE_URL }}
      FRONTEND_URL: ${{ env.FRONTEND_URL }}
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            e2e/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Selenium dependencies
        run: python -m pip install -r e2e/requirements.txt

      - name: Seed backend database
        working-directory: backend
        run: python -m Tests.populate_db

      - name: Start backend
        working-directory: backend
        run: python -m uvicorn main:app --host 127.0.0.1 --port 8000 > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: BROWSER=none HOST=127.0.0.1 npm start > ../frontend.log 2>&1 &

      - name: Wait for local app
        run: |
          for url in http://127.0.0.1:8000 http://127.0.0.1:3000; do
            for attempt in {1..60}; do
              if curl --silent --fail "$url" > /dev/null; then
                break
              fi

              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $url"
                cat backend.log || true
                cat frontend.log || true
                exit 1
              fi

              sleep 2
            done
          done

      - name: Run Selenium tests
        run: python -m pytest e2e -q

      - name: Upload Selenium debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-debug-artifacts
          path: |
            e2e-artifacts/
            backend.log
            frontend.log

  deployment-ready:
    name: Deployment readiness
    runs-on: ubuntu-latest
    needs:
      - backend-release-checks
      - frontend-release-checks
      - selenium-e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Render blueprint exists
        run: test -f render.yaml

      - name: Verify Python version pin exists
        run: test -f .python-version

  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: deployment-ready
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured; skipping deploy trigger."
            exit 0
          fi

          curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"

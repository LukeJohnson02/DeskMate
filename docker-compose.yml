services:
  backend:
    build:
      context: ./backend
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALGORITHM: HS256
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8001}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3001}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY before starting the backend}
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app.db:/app/app.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    environment:
      BROWSER: none
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8001}
      WDS_SOCKET_HOST: localhost
    ports:
      - "3001:3000"
    depends_on:
      - backend
    command: npm start
